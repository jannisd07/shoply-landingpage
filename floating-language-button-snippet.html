<!-- Floating Language Button HTML Snippet -->
<!-- Include this after the mobile menu on each page -->

<!-- Floating Language Button -->
<button class="floating-language-button" id="floatingLanguageButton" aria-label="Change language">
    <span id="floatingCurrentLang">EN</span>
</button>

<!-- Floating Language Dropdown -->
<div class="floating-language-dropdown" id="floatingLanguageDropdown">
    <a href="/" class="language-option active" data-lang="en">
        <span>English</span>
    </a>
    <a href="/de" class="language-option" data-lang="de">
        <span>Deutsch</span>
    </a>
    <a href="/es" class="language-option" data-lang="es">
        <span>Español</span>
    </a>
    <a href="/fr" class="language-option" data-lang="fr">
        <span>Français</span>
    </a>
    <a href="/it" class="language-option" data-lang="it">
        <span>Italiano</span>
    </a>
</div>
